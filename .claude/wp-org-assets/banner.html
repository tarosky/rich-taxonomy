<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1544px; height: 500px; }
  .banner {
    position: relative;
    width: 1544px;
    height: 500px;
    overflow: hidden;
    /* White base + soft cyan glows that fade to transparent (=> white) well
       before every edge, so all four edges are pure #FFFFFF and blend
       seamlessly with the white WordPress.org page. */
    background:
      radial-gradient(205px 175px at 224px 186px, rgba(0,169,217,0.50) 0%, rgba(0,169,217,0.18) 55%, rgba(0,169,217,0) 100%),
      radial-gradient(305px 200px at 1235px 200px, rgba(0,169,217,0.34) 0%, rgba(0,169,217,0) 100%),
      #ffffff;
    font-family: 'Avenir Next', -apple-system, sans-serif;
  }
  .left {
    position: absolute;
    left: 96px;
    top: 50%;
    transform: translateY(-50%);
  }
  .title {
    font-weight: 800;
    font-size: 118px;
    line-height: 1.0;
    letter-spacing: -2px;
    color: #10222d;
  }
  .rule {
    width: 108px;
    height: 9px;
    border-radius: 4px;
    background: #00a9d9;
    margin: 34px 0 30px;
  }
  .tagline {
    font-weight: 600;
    font-size: 40px;
    letter-spacing: -0.5px;
    color: #45555f;
  }
  .mark {
    position: absolute;
    right: 210px;
    top: 92px;
    width: 262px;
    height: 262px;
  }
  .wordmark {
    position: absolute;
    right: 96px;
    bottom: 74px;
    width: 232px;
  }
  .wordmark svg, .mark svg { display: block; width: 100%; height: 100%; }
</style>
</head>
