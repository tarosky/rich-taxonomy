name: Test Plugin

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    name: PHP UnitTest
    strategy:
      matrix:
        php: [ '7.4', '8.0' ] # PHP versions to check.
        wp: [ 'latest', '5.9' ]      # WordPress version to check.
    uses: tarosky/workflows/.github/workflows/wp-unit-test.yml@main
    with:
      php_version: ${{ matrix.php }}
      wp_version: ${{ matrix.wp }}

  phpcs:
    name: Check PHP Codes
    uses: tarosky/workflows/.github/workflows/phpcs.yml@main
    with:
      version: 7.4

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: composer run phpstan

  # TODO: tarosky/workflows#77 が完了したら coverage: true を追加
  # coverage: ${{ matrix.php == '8.0' && matrix.wp == 'latest' }}

  assets:
    name: Check Assets
    uses: tarosky/workflows/.github/workflows/npm.yml@main
    with:
      node_version: 20
      package: package

  status-check:
    name: Status Check
    runs-on: ubuntu-latest
    needs: [ test, phpcs, phpstan, assets ]
    steps:
      - name: Display
        run: echo "All Green!"
